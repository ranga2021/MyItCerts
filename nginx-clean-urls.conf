location / {
    try_files $uri $uri/ @php_routes;
}

location @php_routes {
    rewrite ^/(.+)$ /$1.php last;
}

location ~ \.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
}

# Optional: redirect explicit .php URLs to clean URLs
location ~ ^/(.+)\.php$ {
    return 301 /$1;
}
